# DocuSign Integration
#
# Electronic signature platform used for routing contracts, purchase
# orders, and approval memos for signature. Provides legally binding
# e-signatures compliant with ESIGN and UETA.

id = "bb000001-aaaa-4bbb-8ccc-ddddeeee0001"
organization_id = "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
name = "DocuSign"
description = "Electronic signature platform for routing contracts and approval documents. Provides legally binding e-signatures, audit trails, and automated reminders for pending signatures."
created_at = "2025-01-17T08:00:00Z"
updated_at = "2025-01-17T08:00:00Z"

# Capabilities exposed by this integration.
# The integration compiler references these when compiling edge specifications.

[[capabilities]]
id = "c1000001-aaaa-4bbb-8ccc-ddddeeee0001"
name = "route_for_signature"
description = "Route a document to one or more signers in a specified order. Creates a DocuSign envelope with the document, assigns signing fields, and sends notification emails to signers."
input_schema = { type = "object", properties = { document_url = { type = "string" }, signers = { type = "array", items = { type = "object", properties = { name = { type = "string" }, email = { type = "string" }, order = { type = "integer" } } } }, subject = { type = "string" }, message = { type = "string" } }, required = ["document_url", "signers"] }
output_schema = { type = "object", properties = { envelope_id = { type = "string" }, status = { type = "string" }, sent_at = { type = "string", format = "date-time" } } }

[[capabilities]]
id = "c1000002-aaaa-4bbb-8ccc-ddddeeee0002"
name = "check_signature_status"
description = "Check the current status of a DocuSign envelope. Returns the signing status for each recipient and the overall envelope status (sent, delivered, completed, declined, voided)."
input_schema = { type = "object", properties = { envelope_id = { type = "string" } }, required = ["envelope_id"] }
output_schema = { type = "object", properties = { envelope_id = { type = "string" }, status = { type = "string" }, recipients = { type = "array", items = { type = "object", properties = { name = { type = "string" }, status = { type = "string" }, signed_at = { type = "string", format = "date-time" } } } } } }
