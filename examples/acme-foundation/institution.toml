# Institutional rules — these are the top-level governance constraints
# that apply across all workflows and decision points.
[rules]
board_approval_threshold = "All purchases over $5,000 require board approval before commitment"
sanctions_vetting = "Vendors must be vetted against OFAC sanctions lists and SAM.gov exclusions before any contract engagement"
emergency_procurement = "Emergency procurement may bypass standard review with post-hoc documentation submitted within 48 hours and ratified at the next board meeting"
conflict_of_interest = "Staff with personal or financial relationships to a vendor must recuse themselves from the procurement process and disclose the conflict in writing"
sole_source_justification = "Sole-source contracts exceeding $2,500 require a written justification memo approved by the Finance Director"
grant_fund_segregation = "Restricted grant funds may only be used for procurement directly related to the grant's stated purpose and budget line items"
