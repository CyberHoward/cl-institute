name = "Acme Foundation"
description = "A mid-size nonprofit foundation dedicated to community development, education, and environmental stewardship. Founded in 2003, the Foundation operates grant programs across three focus areas and maintains strict procurement and financial controls as required by its 501(c)(3) status."
created_at = "2025-01-15T10:00:00Z"
