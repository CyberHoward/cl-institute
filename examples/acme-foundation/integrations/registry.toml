# Integration Registry
#
# Manifest listing all external integrations configured for the
# Acme Foundation. Each entry references an integration definition
# file in this directory.
#
# Note: This file is metadata only. The integration compiler reads
# individual integration TOML files for capability definitions.
# Credentials and connection details are managed through environment
# configuration, never stored in the project directory.

[[integrations]]
name = "DocuSign"
file = "docusign.toml"
description = "Electronic signature platform for contract execution"

[[integrations]]
name = "SAP"
file = "sap.toml"
description = "Enterprise resource planning for financial management"
